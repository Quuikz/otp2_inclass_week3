services:
  db:
    image: mariadb:11
    container_name: otp2-week3-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: fuel_calculator_localization
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./database/seed_localization_strings.sql:/docker-entrypoint-initdb.d/02_seed_localization_strings.sql:ro
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-ppassword"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: rikukuikka/otp2_localization_week3:latest
    container_name: otp2-week3-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mariadb://db:3306/
      DB_NAME: fuel_calculator_localization
      DB_USER: fuel_calculator_user
      DB_PASSWORD: password
      DISPLAY: host.docker.internal:0
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix

volumes:
  db_data:

#  Then execute docker compose up --build
